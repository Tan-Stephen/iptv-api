name: 'Update verified playlist'

on:
  schedule:
    # 北京时间每天 06:20 和 18:20 更新，避开常见整点高峰。
    - cron: '20 22,10 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: iptv-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    timeout-minutes: 60
    strategy:
      matrix:
        operating-system: [ 'ubuntu-latest' ]
    steps:
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=master" >> $GITHUB_ENV
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0
      - name: Run with setup-python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pip'
          cache-dependency-path: 'Pipfile.lock'
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install pipenv
        run: pip3 install --user pipenv
      - name: Install dependecies
        run: pipenv --python 3.13 && pipenv install --deploy
      - name: Back up last verified playlist
        run: |
          mkdir -p "$RUNNER_TEMP/iptv-backup"
          cp output/user_result.m3u "$RUNNER_TEMP/iptv-backup/user_result.m3u" 2>/dev/null || true
          cp output/user_result.txt "$RUNNER_TEMP/iptv-backup/user_result.txt" 2>/dev/null || true
      - name: Update
        run: pipenv run dev
      - name: Verify generated playlist with FFprobe
        run: |
          pipenv run python scripts/validate_playlist.py \
            output/user_result.m3u \
            --output output/user_result.m3u \
            --txt-output output/user_result.txt \
            --report output/log/validation.json \
            --timeout 12 \
            --workers 12 \
            --min-channels 20
      - name: Restore last verified playlist on failure
        if: failure()
        run: |
          cp "$RUNNER_TEMP/iptv-backup/user_result.m3u" output/user_result.m3u 2>/dev/null || true
          cp "$RUNNER_TEMP/iptv-backup/user_result.txt" output/user_result.txt 2>/dev/null || true
      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iptv-output
          path: |
            output/**
            output/log/**
            output/epg/**
          if-no-files-found: warn
          retention-days: 7
      - name: Commit and push if changed
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add \
            output/user_result.m3u \
            output/user_result.txt \
            output/epg/epg.gz \
            output/epg/epg.xml \
            output/log/validation.json \
            version.json || true
          if ! git diff --staged --quiet; then
            git commit -m "Github Action Auto Updated"
            git push
          fi
