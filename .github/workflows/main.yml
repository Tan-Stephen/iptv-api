name: 'Update verified playlist'

on:
  schedule:
    - cron: '0 10 */2 * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: iptv-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    timeout-minutes: 60
    strategy:
      matrix:
        operating-system: [ 'ubuntu-latest' ]
    steps:
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=master" >> $GITHUB_ENV
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0
      - name: Run with setup-python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pip'
          cache-dependency-path: 'Pipfile.lock'
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install pipenv
        run: pip3 install --user pipenv
      - name: Install dependecies
        run: pipenv --python 3.13 && pipenv install --deploy
      - name: Back up last verified playlist
        run: |
          mkdir -p "$RUNNER_TEMP/iptv-backup"
          cp output/user_result.m3u "$RUNNER_TEMP/iptv-backup/user_result.m3u" 2>/dev/null || true
          cp output/user_result.txt "$RUNNER_TEMP/iptv-backup/user_result.txt" 2>/dev/null || true
          cp output/log/garyshare_validation.json "$RUNNER_TEMP/iptv-backup/garyshare_validation.json" 2>/dev/null || true
      - name: Update
        run: pipenv run dev
      - name: Verify generated playlist with FFprobe
        id: verify_generated
        continue-on-error: true
        run: |
          pipenv run python scripts/validate_playlist.py \
            output/user_result.m3u \
            --output output/user_result.m3u \
            --txt-output output/user_result.txt \
            --report output/log/validation.json \
            --timeout 12 \
            --workers 12 \
            --min-channels 20
      - name: Restore and verify last published playlist
        if: steps.verify_generated.outcome == 'failure'
        run: |
          cp "$RUNNER_TEMP/iptv-backup/user_result.m3u" output/user_result.m3u
          cp "$RUNNER_TEMP/iptv-backup/user_result.txt" output/user_result.txt
          pipenv run python scripts/validate_playlist.py \
            output/user_result.m3u \
            --output output/user_result.m3u \
            --txt-output output/user_result.txt \
            --report output/log/validation.json \
            --timeout 12 \
            --workers 12 \
            --min-channels 20
      - name: Merge GaryShare full playlist
        id: merge_garyshare
        continue-on-error: true
        run: |
          pipenv run python scripts/merge_garyshare_playlist.py \
            --source-url https://garyshare.sharewithyou.dpdns.org/mylist.m3u \
            --playlist output/user_result.m3u \
            --txt-output output/user_result.txt \
            --report output/log/garyshare_validation.json \
            --fetch-timeout 60 \
            --fetch-retries 3 \
            --timeout 8 \
            --workers 32 \
            --min-valid 20
      - name: Restore last GaryShare playlist on merge failure
        if: steps.merge_garyshare.outcome == 'failure'
        run: |
          cp "$RUNNER_TEMP/iptv-backup/user_result.m3u" output/user_result.m3u
          cp "$RUNNER_TEMP/iptv-backup/user_result.txt" output/user_result.txt
          cp "$RUNNER_TEMP/iptv-backup/garyshare_validation.json" output/log/garyshare_validation.json 2>/dev/null || true
      - name: Verify final merged playlist with FFprobe
        run: |
          pipenv run python scripts/validate_playlist.py \
            output/user_result.m3u \
            --output output/user_result.m3u \
            --txt-output output/user_result.txt \
            --report output/log/validation.json \
            --timeout 12 \
            --workers 12 \
            --min-channels 20
      - name: Record playlist selection
        if: always()
        run: |
          if [ "${{ steps.verify_generated.outcome }}" = "success" ]; then
            echo "### Playlist update" >> "$GITHUB_STEP_SUMMARY"
            echo "Published the newly generated playlist after GaryShare merge and FFprobe validation." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Playlist fallback" >> "$GITHUB_STEP_SUMMARY"
            echo "The generated playlist missed the 20-channel threshold; kept the last published playlist, then merged GaryShare and revalidated." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iptv-output
          path: |
            output/**
            output/log/**
            output/epg/**
          if-no-files-found: warn
          retention-days: 7
      - name: Commit and push if changed
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add \
            output/user_result.m3u \
            output/user_result.txt \
            output/epg/epg.gz \
            output/epg/epg.xml \
            output/log/garyshare_validation.json \
            output/log/validation.json \
            version.json || true
          if ! git diff --staged --quiet; then
            git commit -m "Github Action Auto Updated"
            git push
          fi
